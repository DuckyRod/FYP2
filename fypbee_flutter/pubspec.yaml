name: fypbee
description: FYPBee - Mobile All-In-One FYP System prototype
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  file_picker: ^8.1.2
  firebase_storage: ^13.3.0
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/app_icon.png"